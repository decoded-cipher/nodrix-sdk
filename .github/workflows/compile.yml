name: compile

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - fqbn: esp32:esp32:esp32
            platform_name: esp32:esp32
            platform_url: https://espressif.github.io/arduino-esp32/package_esp32_index.json
          - fqbn: esp8266:esp8266:nodemcuv2
            platform_name: esp8266:esp8266
            platform_url: https://arduino.esp8266.com/stable/package_esp8266com_index.json
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/compile-sketches@v1
        with:
          fqbn: ${{ matrix.fqbn }}
          platforms: |
            - name: ${{ matrix.platform_name }}
              source-url: ${{ matrix.platform_url }}
          libraries: |
            - name: ArduinoJson
            - name: WebSockets
            - source-path: ./
          sketch-paths: |
            - examples/LedControl
            - examples/HomeLights
            - examples/SensorTelemetry
            - examples/DeepSleepSensor
