name: Publish to ESP Component Registry

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate packaging without publishing a version"
        type: boolean
        default: true
      version:
        description: "Version to publish on a manual run (e.g. 0.1.0)"
        required: false

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: espressif/upload-components-ci-action@v2
        with:
          namespace: "decoded-cipher"
          components: "Nodrix:."
          version: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}
          dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}
