name: Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (validate packaging without publishing)"
        type: boolean
        default: true
      version:
        description: "Version to publish on a manual run (e.g. 0.1.0)"
        required: false

jobs:
  esp-component-registry:
    name: ESP Component Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: espressif/upload-components-ci-action@v2
        with:
          namespace: "decoded-cipher"
          components: "Nodrix:."
          version: ${{ github.event_name == 'push' && github.ref_name || inputs.version }}
          dry_run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
          api_token: ${{ secrets.IDF_COMPONENT_API_TOKEN }}

  platformio-registry:
    name: PlatformIO Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: pip install --upgrade platformio
      - name: Publish
        if: github.event_name == 'push' || !inputs.dry_run
        run: pio pkg publish --no-interactive
        env:
          PLATFORMIO_AUTH_TOKEN: ${{ secrets.PLATFORMIO_AUTH_TOKEN }}
      - name: Validate packaging (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: pio pkg pack

  arduino-lint:
    name: Arduino Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: arduino/arduino-lint-action@v1
        with:
          library-manager: update
