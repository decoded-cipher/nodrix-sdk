name=Nodrix
version=0.1.0
author=Arjun Krishna
maintainer=Arjun Krishna <arjun12345krishna@gmail.com>
sentence=Connect ESP32/ESP8266 hardware to Nodrix with a few lines of code.
paragraph=Blynk-style library for the Nodrix IoT platform. Hides WiFi, TLS, WebSocket/HTTP, JSON and the control/telemetry protocol behind a tiny API. Handle cloud commands with NODRIX_WRITE("var"){...} and push telemetry with Nodrix.send(). Works over an always-on WebSocket or HTTP polling for deep-sleep devices.
category=Communication
url=https://github.com/decoded-cipher/nodrix-sdk
architectures=esp32,esp8266
depends=ArduinoJson,WebSockets
includes=Nodrix.h
